<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM by kaushal</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <ul class="language">
        <li>javascipt</li>
    </ul>
</body>
<script>
    function addLanguage(langName){
        const list = document.createElement('li');
        // console.log(list)
        list.innerHTML = `${langName}`
        const lang =document.querySelector('.language');
        lang.appendChild(list)
    }
    addLanguage("python")
    addLanguage("java")
    
    function addOptiLang(langName) {
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLang("c++")
    addOptiLang("c")

    //Edit
    const secondLang =document.querySelector("li:nth-child(2)")
    //secondLang.innerHTML = "mojo"
    const newLi =document.createElement('li')
    newLi.textContent ="mojo"
    secondLang.replaceWith(newLi)

    //edit
    // const thirdLang = document.querySelector("li:nth-child(3)")
    // //console.log(thirdLang);
    // const newlist= document.createElement('li')
    // newlist.textContent = "react"
    // thirdLang.replaceWith(newlist)
    const firstlang = document.querySelector("li:first-child")
    firstlang.outerHTML = '<li>typescript</li>'

    //remove
    const lastlang = document.querySelector('li:last-child')
    lastlang.remove()
    
</script>
</html>
